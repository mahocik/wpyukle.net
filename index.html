<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostbet</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
}

/* BODY FULL SCREEN */
body {
  width: 100%;
  height: 100dvh;
  background: radial-gradient(circle, #6b3d00 0%, #1c0e00 50%, #000 100%);
  font-family: Arial, sans-serif;
}

/* FULL CARD */
.card {
  width: 100%;
  height: 100dvh; /* BURDA FULL EKRAN */
  padding: 25px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

/* TITLE */
.title {
  color: #ff9d00;
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 15px;
}

/* TEXT */
.text {
  color: #eee;
  font-size: 18px;
  margin-bottom: 8px;
}

/* BONUS */
.bonus {
  color: #ffc107;
  font-size: 36px;
  font-weight: 900;
  margin: 25px 0;
}

/* LIST */
.list {
  margin: 20px 0;
}

.list p {
  font-size: 18px;
  margin: 10px 0;
  color: #ddd;
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  padding: 20px;
  background: linear-gradient(90deg, #ff9800, #ff5e00);
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  border-radius: 40px;
  text-decoration: none;
  margin-top: 20px;
}

/* FOOTER */
.footer {
  color: #aaa;
  font-size: 15px;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="card">

  <div class="title">MOSTBET</div>

  <div class="text">Mostbet ilə qazancını artır!</div>
  <div class="text">İndi qeydiyyatdan keç və ilk depozitində</div>
  <div class="text">💰 10–20 AZN yatıraraq 🎁</div>

  <div class="bonus">200$-a qədər bonus əldə et!</div>

  <div class="list">
    <p>🔥 Sürətli qeydiyyat</p>
    <p>🔥 Asan depozit & çıxarış</p>
    <p>🔥 Yüksək qazanc şansı</p>
  </div>

  <a href="https://66avrzh.com/eb0U" class="btn">
    👉 Qeydiyyatdan keç
  </a>

  <div class="footer">
    İndi qoşul və qazanmağa başla!
  </div>

</div>

</body>
</html>
