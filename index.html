<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Qazanc</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:white;
}

.box{
  max-width:400px;
  margin:80px auto;
  padding:20px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1f1f1f;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#f5a623;
  font-weight:bold;
}

.link{
  text-align:center;
  margin-top:15px;
  color:#aaa;
}

.hidden{display:none;}

.panel{
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="box" id="auth">

<h2 id="title">Giriş Et</h2>

<input id="user" placeholder="Login">
<input id="pass" type="password" placeholder="Parol">

<button onclick="action()">Giriş</button>

<div class="link" onclick="toggle()">Qeydiyyat</div>

</div>

<div class="panel hidden" id="panel">

<h2>Balans: <span id="bal">0</span> AZN</h2>

<div class="card">
<button onclick="bonus()">🎁 Bonus al (+0.05)</button>
</div>

<div class="card">
<button onclick="task()">🎯 Tapşırıq et (+0.05)</button>
</div>

<div class="card">
<p>Referral link:</p>
<input id="ref" readonly>
</div>

<div class="card">
<button onclick="withdraw()">📤 Çıxarış</button>
</div>

<button onclick="logout()">Çıxış</button>

</div>

<script>

let mode="login";
let current=null;

function toggle(){
  if(mode=="login"){
    mode="reg";
    title.innerText="Qeydiyyat";
    document.querySelector("button").innerText="Qeydiyyatdan keç";
  }else{
    mode="login";
    title.innerText="Giriş Et";
    document.querySelector("button").innerText="Giriş";
  }
}

function action(){
  let u=user.value;
  let p=pass.value;

  if(!u||!p)return alert("Boş buraxma");

  if(mode=="reg"){
    localStorage.setItem(u,JSON.stringify({pass:p,balance:0}));
    alert("Qeydiyyat oldu");
    return;
  }

  let data=JSON.parse(localStorage.getItem(u));

  if(!data||data.pass!=p)return alert("Yanlış");

  current=u;
  auth.style.display="none";
  panel.style.display="block";

  bal.innerText=data.balance.toFixed(2);
  ref.value=location.href+"?ref="+u;
}

function save(b){
  let d=JSON.parse(localStorage.getItem(current));
  d.balance=b;
  localStorage.setItem(current,JSON.stringify(d));
  bal.innerText=b.toFixed(2);
}

function bonus(){
  let d=JSON.parse(localStorage.getItem(current));
  save(d.balance+0.05);
}

function task(){
  let d=JSON.parse(localStorage.getItem(current));
  save(d.balance+0.05);
}

function withdraw(){
  let d=JSON.parse(localStorage.getItem(current));
  if(d.balance<5)return alert("Minimum 5 AZN");
  alert("Sorğu göndərildi");
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
