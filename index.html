<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klik Et</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: Arial, sans-serif;
    }

    .btn {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      background: #ff3d00;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff5722;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <a href="https://pulvar.xyz" class="btn" target="_blank">
    BURA KLİK EDİN
  </a>

</body>
</html>
