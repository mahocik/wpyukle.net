<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Plus</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:30px 20px;
}

/* BAŞLIQ */
h1{
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

/* IPHONE SEKIL */
.iphone{
width:200px;
margin:20px auto;
filter: drop-shadow(0 0 20px #00ff88);
}

/* YANIB SÖNƏN BLOK */
.features{
margin-top:15px;
padding:15px;
border-radius:15px;
border:1px solid #00ff88;
animation: glow 1.2s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #00ff88;}
100%{box-shadow:0 0 30px #00ff88;}
}

.features p{
margin:6px 0;
}

/* QİYMƏT */
.price{
margin:20px 0;
padding:15px;
border-radius:20px;
border:1px solid #00ff88;
color:#00ff88;
box-shadow:0 0 20px #00ff88;
}

/* DÜYMƏ YANIB SÖNÜR */
.btn{
background:#00ff88;
color:#000;
padding:15px;
border:none;
border-radius:30px;
width:100%;
margin-top:10px;
font-weight:bold;
animation: pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px #00ff88;}
50%{box-shadow:0 0 25px #00ff88;}
100%{box-shadow:0 0 5px #00ff88;}
}

/* AÇILAN */
.sheet{
display:none;
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
border-radius:20px 20px 0 0;
}

/* KART */
.card{
margin-top:10px;
padding:15px;
background:#1a1a1a;
border-radius:15px;
}

.card-number{
color:#00ff88;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>WhatsApp Plus 2026</h1>
<p>iPhone üçün yeni versiya</p>

<!-- IPHONE -->
<img class="iphone" src="https://i.imgur.com/8Km9tLL.png">

<!-- MƏTN -->
<div class="features">
<p>📱 WhatsApp Plus iPhone üçün</p>
<p>Gizli funksiyalar və fərqli dizayn</p>
<p>🔒 Son görülmə gizli</p>
<p>👀 Statuslara gizli baxış</p>
<p>🎨 VIP görünüş</p>
</div>

<div class="price">6₼ · 3 il istifadə</div>

<button class="btn" onclick="openSheet()">Əldə et</button>

</div>

<!-- AÇILAN -->
<div class="sheet" id="sheet">

<p>6₼ birdəfəlik ödəniş<br>3 il istifadə</p>

<div class="card">
<p>ABB BANK</p>
<p class="card-number">4127 2141 2112 2730</p>
<p>M.A</p>
</div>

<button class="btn" onclick="copyCard()">Kartı kopyala</button>

<a href="https://t.me/kenrrry">
<button class="btn">Dəstək</button>
</a>

<button class="btn" onclick="closeSheet()">Bağla</button>

</div>

<script>
function openSheet(){
document.getElementById("sheet").style.display="block";
}

function closeSheet(){
document.getElementById("sheet").style.display="none";
}

function copyCard(){
navigator.clipboard.writeText("4127 2141 2112 2730");
alert("Kopyalandı");
}
</script>

</body>
</html>
