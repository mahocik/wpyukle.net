<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mostbet Bonus</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #6b3d00 0%, #1c0e00 45%, #000000 100%);
      padding: 0;
    }

    .wrapper {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: #050505;
      border-radius: 28px;
      padding: 28px 20px 24px;
      text-align: center;
      border: 1px solid rgba(255, 166, 0, 0.22);
      box-shadow: 0 0 45px rgba(255, 136, 0, 0.35);
    }

    .title {
      color: #ff9d00;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .text {
      color: #e7e7e7;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .bonus {
      color: #ffc107;
      font-size: 31px;
      font-weight: 800;
      line-height: 1.2;
      margin: 24px 0 26px;
      text-shadow: 0 0 12px rgba(255, 193, 7, 0.18);
    }

    .list {
      text-align: left;
      margin: 0 auto 24px;
      max-width: 270px;
    }

    .list p {
      color: #d7d7d7;
      font-size: 15px;
      margin: 12px 0;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      background: linear-gradient(90deg, #ff9800, #ff6a00);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 20px;
      border-radius: 40px;
      margin-top: 8px;
      box-shadow: 0 0 20px rgba(255, 132, 0, 0.35);
    }

    .footer {
      color: #8f8f8f;
      font-size: 13px;
      margin-top: 16px;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .card {
        max-width: 100%;
        padding: 26px 18px 22px;
      }

      .title {
        font-size: 26px;
      }

      .bonus {
        font-size: 28px;
      }

      .btn {
        font-size: 17px;
        padding: 17px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="title">MOSTBET</div>

      <div class="text">Mostbet ilə qazancını artır!</div>
      <div class="text">İndi qeydiyyatdan keç və ilk depozitində</div>
      <div class="text">💰 10–20 AZN yatıraraq 🎁</div>

      <div class="bonus">200$-a qədər bonus əldə et!</div>

      <div class="list">
        <p>🔥 Sürətli qeydiyyat</p>
        <p>🔥 Asan depozit & çıxarış</p>
        <p>🔥 Yüksək qazanc şansı</p>
      </div>

      <a class="btn" href="https://66avrzh.com/eb0U">👉 Qeydiyyatdan keç</a>

      <div class="footer">İndi qoşul və qazanmağa başla!</div>
    </div>
  </div>
</body>
</html>
