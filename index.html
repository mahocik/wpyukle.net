<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mostbet Bonus</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #6b4300 0%, #1a0f00 60%, #000 100%);
  font-family: Arial, sans-serif;
}

/* KART */
.card {
  width: 90%;
  max-width: 400px;
  background: #0a0a0a;
  border-radius: 25px;
  padding: 30px 20px;
  box-shadow: 0 0 30px rgba(255, 140, 0, 0.4);
  border: 1px solid rgba(255, 166, 0, 0.3);
  text-align: center;
}

/* BASLIQ */
.title {
  color: #ffa500;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* METN */
.text {
  color: #ddd;
  font-size: 15px;
  margin-bottom: 10px;
}

.highlight {
  color: #ffcc00;
  font-size: 28px;
  font-weight: bold;
  margin: 20px 0;
}

/* LIST */
.list {
  text-align: left;
  margin: 15px 0;
}

.list p {
  color: #ccc;
  margin: 8px 0;
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(90deg, #ff8c00, #ff5e00);
  border: none;
  border-radius: 30px;
  color: #fff;
  font-size: 18px;
  font-weight: bold;
  margin-top: 20px;
  cursor: pointer;
  text-decoration: none;
}

.btn:hover {
  opacity: 0.9;
}

.footer {
  color: #888;
  font-size: 13px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">

  <div class="title">MOSTBET</div>

  <div class="text">
    Mostbet ilə qazancını artır!
  </div>

  <div class="text">
    İndi qeydiyyatdan keç və ilk depozitində
  </div>

  <div class="text">
    💰 10–20 AZN yatıraraq 🎁
  </div>

  <div class="highlight">
    200$-a qədər bonus əldə et!
  </div>

  <div class="list">
    <p>🔥 Sürətli qeydiyyat</p>
    <p>🔥 Asan depozit & çıxarış</p>
    <p>🔥 Yüksək qazanc şansı</p>
  </div>

  <!-- BUTTON -->
  <a href="https://66avrzh.com/eb0U" class="btn">
    👉 Qeydiyyatdan keç
  </a>

  <div class="footer">
    İndi qoşul və qazanmağa başla!
  </div>

</div>

</body>
</html>
