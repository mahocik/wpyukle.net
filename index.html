<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulvar Qazanc</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}
.container {
  padding:20px;
}
input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}
input {
  background:#222;
  color:white;
}
button {
  background:#f5a623;
  color:black;
  font-weight:bold;
}
.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
.hidden {display:none;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <h2>Giriş Et</h2>
  <input id="loginUser" placeholder="Login">
  <input id="loginPass" type="password" placeholder="Parol">
  <button onclick="login()">Giriş</button>
  <p onclick="showRegister()">Qeydiyyat</p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
  <h2>Qeydiyyat</h2>
  <input id="regUser" placeholder="Login">
  <input id="regPass" type="password" placeholder="Parol">
  <button onclick="register()">Qeydiyyatdan keç</button>
  <p onclick="showLogin()">Girişə qayıt</p>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
  <h2>Balans: <span id="balance">0</span> AZN</h2>

  <div class="card">
    <h3>🎁 Gündəlik bonus</h3>
    <button onclick="daily()">Al</button>
  </div>

  <div class="card">
    <h3>🎯 Tapşırıq</h3>
    <button onclick="task()">Tapşırıq et (+0.05 AZN)</button>
  </div>

  <div class="card">
    <h3>👥 Referral</h3>
    <p>Sənin linkin:</p>
    <input id="refLink" readonly>
  </div>

  <div class="card">
    <h3>📤 Çıxarış</h3>
    <button onclick="withdraw()">Pul çıxar</button>
  </div>

  <button onclick="logout()">Çıxış</button>
</div>

</div>

<script>

let currentUser = null;

function showRegister(){
  login.style.display="none";
  register.style.display="block";
}
function showLogin(){
  register.style.display="none";
  login.style.display="block";
}

function register(){
  let u = regUser.value;
  let p = regPass.value;

  if(!u || !p) return alert("Boş buraxma");

  localStorage.setItem(u, JSON.stringify({
    pass:p,
    balance:0
  }));

  alert("Qeydiyyat tamam");
  showLogin();
}

function login(){
  let u = loginUser.value;
  let p = loginPass.value;

  let data = JSON.parse(localStorage.getItem(u));

  if(!data || data.pass !== p){
    return alert("Yanlış məlumat");
  }

  currentUser = u;
  login.style.display="none";
  panel.style.display="block";

  document.getElementById("balance").innerText = data.balance.toFixed(2);

  document.getElementById("refLink").value =
    location.href + "?ref=" + u;
}

function save(balance){
  let data = JSON.parse(localStorage.getItem(currentUser));
  data.balance = balance;
  localStorage.setItem(currentUser, JSON.stringify(data));
  document.getElementById("balance").innerText = balance.toFixed(2);
}

function daily(){
  let data = JSON.parse(localStorage.getItem(currentUser));
  let b = data.balance + 0.05;
  save(b);
}

function task(){
  let data = JSON.parse(localStorage.getItem(currentUser));
  let b = data.balance + 0.05;
  save(b);
}

function withdraw(){
  let data = JSON.parse(localStorage.getItem(currentUser));

  if(data.balance < 5){
    alert("Minimum 5 AZN lazımdır");
    return;
  }

  alert("Sorğu qəbul edildi");
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
