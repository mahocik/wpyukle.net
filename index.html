<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Plus</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#000;
color:#fff;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:30px 20px;
}

h1{
color:#00ff88;
text-shadow:0 0 20px #00ff88;
}

.iphone{
width:200px;
margin:20px auto;
filter: drop-shadow(0 0 20px #00ff88);
}

/* popup */
.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:10px 15px;
border-radius:10px;
border:1px solid #00ff88;
display:none;
}

/* glow */
.features{
padding:15px;
border-radius:15px;
border:1px solid #00ff88;
animation:glow 1.2s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 5px #00ff88;}
100%{box-shadow:0 0 25px #00ff88;}
}

/* button */
.btn{
background:#00ff88;
color:#000;
padding:15px;
border:none;
border-radius:30px;
width:100%;
margin-top:10px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px #00ff88;}
50%{box-shadow:0 0 25px #00ff88;}
100%{box-shadow:0 0 5px #00ff88;}
}

.price{
margin:20px 0;
color:#00ff88;
}

/* modal */
.sheet{
display:none;
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
border-radius:20px 20px 0 0;
}
</style>
</head>

<body>

<div class="container">

<h1>WhatsApp Plus 2026</h1>
<p>iPhone üçün yeni versiya</p>

<img class="iphone" src="https://i.imgur.com/8Km9tLL.png">

<div class="features">
<p>📱 WhatsApp Plus iPhone üçün</p>
<p>🔒 Son görülmə gizli</p>
<p>👀 Statuslara gizli baxış</p>
<p>🎨 VIP görünüş</p>
</div>

<div class="price">
6₼ · 3 il istifadə<br>
⏳ Təklif bitir: <span id="time">05:00</span>
</div>

<button class="btn" onclick="openSheet()">Əldə et</button>

</div>

<!-- popup -->
<div class="popup" id="popup"></div>

<!-- modal -->
<div class="sheet" id="sheet">

<p>6₼ birdəfəlik ödəniş<br>3 il istifadə</p>

<p>ABB BANK</p>
<p id="card">4127 2141 2112 2730</p>

<button class="btn" onclick="copyCard()">Kartı kopyala</button>

<button class="btn" onclick="goTelegram()">Dəstək</button>

<button class="btn" onclick="closeSheet()">Bağla</button>

</div>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
function playSound(){
document.getElementById("clickSound").play();
}

function openSheet(){
playSound();
document.getElementById("sheet").style.display="block";
}

function closeSheet(){
playSound();
document.getElementById("sheet").style.display="none";
}

function copyCard(){
playSound();
navigator.clipboard.writeText("4127 2141 2112 2730");
alert("Kart kopyalandı");
}

function goTelegram(){
playSound();
window.open("https://t.me/kenrrry?text=Salam%20mən%206₼%20ödəniş%20etdim","_blank");
}

/* timer */
let t=300;
setInterval(()=>{
if(t>0){
t--;
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").innerText=
(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}
},1000);

/* fake popup */
let names=["Elvin","Murad","Aysel","Nihat","Orxan"];
setInterval(()=>{
let name=names[Math.floor(Math.random()*names.length)];
let popup=document.getElementById("popup");
popup.innerText=name+" WhatsApp Plus aldı";
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);

},6000);
</script>

</body>
</html>
