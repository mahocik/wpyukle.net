<script>
    let progressInterval;
    let stage1, stage2, stage3, finalTimeout;

    const phoneInput = document.getElementById("phoneInput");
    const nameInput = document.getElementById("nameInput");
    const errorMessage = document.getElementById("errorMessage");

    function showError(message, field = null) {
      errorMessage.style.display = "block";
      errorMessage.innerText = message;

      phoneInput.classList.remove("error");
      nameInput.classList.remove("error");

      if (field === "phone") {
        phoneInput.classList.add("error");
      }

      if (field === "name") {
        nameInput.classList.add("error");
      }
    }

    function clearError() {
      errorMessage.style.display = "none";
      errorMessage.innerText = "";
      phoneInput.classList.remove("error");
      nameInput.classList.remove("error");
    }

    function validateAndContinue() {
      clearError();

      const phone = phoneInput.value.trim();
      const name = nameInput.value.trim();

      const phoneDigits = phone.replace(/\D/g, "");

      if (phone === "") {
        showError("Zəhmət olmasa nömrəni daxil edin.", "phone");
        return;
      }

      if (phoneDigits.length < 7) {
        showError("Nömrə düzgün formatda daxil edilməyib.", "phone");
        return;
      }

      if (name === "") {
        showError("Zəhmət olmasa adı daxil edin.", "name");
        return;
      }

      if (name.length < 2) {
        showError("Ad ən azı 2 hərfdən ibarət olmalıdır.", "name");
        return;
      }

      goLoading();
    }

    function goLoading() {
      document.getElementById("mainScreen").style.display = "none";
      document.getElementById("errorScreen").style.display = "none";
      document.getElementById("loadingScreen").style.display = "flex";

      const progressFill = document.getElementById("progressFill");
      const progressPercent = document.getElementById("progressPercent");
      const loadingTitle = document.getElementById("loadingTitle");
      const loadingText = document.getElementById("loadingText");
      const loadingNote = document.getElementById("loadingNote");

      let progress = 0;
      progressFill.style.width = "0%";
      progressPercent.innerText = "0%";

      loadingTitle.innerText = "Məlumatlar yoxlanılır...";
      loadingText.innerText = "Zəhmət olmasa bir qədər gözləyin, sistem məlumatları hazırlayır.";
      loadingNote.innerText = "Bu proses bir neçə dəqiqə çəkə bilər.";

      clearInterval(progressInterval);
      clearTimeout(stage1);
      clearTimeout(stage2);
      clearTimeout(stage3);
      clearTimeout(finalTimeout);

      progressInterval = setInterval(() => {
        if (progress < 100) {
          progress++;
          progressFill.style.width = progress + "%";
          progressPercent.innerText = progress + "%";
        }
      }, 600);

      stage1 = setTimeout(() => {
        loadingTitle.innerText = "Təsdiq gözlənilir...";
        loadingText.innerText = "Sorğu göndərildi. Qarşı tərəfdən təsdiq cavabı gözlənilir.";
        loadingNote.innerText = "Zəhmət olmasa gözləyin.";
      }, 15000);

      stage2 = setTimeout(() => {
        loadingTitle.innerText = "Bağlantı qurulur...";
        loadingText.innerText = "Sistem qoşulmanı tamamlamağa çalışır.";
        loadingNote.innerText = "Şəbəkə vəziyyəti yoxlanılır.";
      }, 35000);

      stage3 = setTimeout(() => {
        loadingTitle.innerText = "Son yoxlamalar aparılır...";
        loadingText.innerText = "Qoşulma tamamlanmağa yaxındır, zəhmət olmasa gözləyin.";
        loadingNote.innerText = "Proses yekunlaşdırılır.";
      }, 50000);

      finalTimeout = setTimeout(() => {
        clearInterval(progressInterval);
        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("errorScreen").style.display = "flex";
      }, 60000);
    }

    function goBack() {
      clearInterval(progressInterval);
      clearTimeout(stage1);
      clearTimeout(stage2);
      clearTimeout(stage3);
      clearTimeout(finalTimeout);

      document.getElementById("errorScreen").style.display = "none";
      document.getElementById("loadingScreen").style.display = "none";
      document.getElementById("mainScreen").style.display = "block";
    }
  </script>
