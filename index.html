<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Plus</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #000;
    color: #fff;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 30px 20px;
    text-align: center;
}

/* başlıq */
h1 {
    font-size: 28px;
    font-weight: 600;
}

.subtitle {
    color: #aaa;
    margin-top: 5px;
}

/* qiymət */
.price {
    font-size: 24px;
    margin: 20px 0;
}

/* düymə */
.btn {
    background: #fff;
    color: #000;
    padding: 15px;
    border-radius: 30px;
    border: none;
    width: 100%;
    font-size: 16px;
    margin-top: 10px;
}

/* kart */
.card-box {
    background: #111;
    border-radius: 20px;
    padding: 15px;
    margin-top: 20px;
}

.card-number {
    font-size: 18px;
    letter-spacing: 2px;
    margin: 10px 0;
}

/* info */
.info {
    font-size: 13px;
    color: #888;
    margin-top: 15px;
}

/* timer */
.timer {
    color: #ff3b30;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>WhatsApp Plus 2026</h1>
<div class="subtitle">iPhone üçün yeni versiya</div>

<div style="color:#34c759;">● 12 nəfər baxır</div>
<div class="timer">Təklif bitir: <span id="time">05:00</span></div>

<div class="price">
6₼ · 3 il istifadə
</div>

<button class="btn" onclick="openModal()">Əldə et</button>

<div class="card-box">
<p>ABB BANK</p>
<div class="card-number" id="card">4127 2141 2112 2730</div>
<p>M.A</p>

<button class="btn" onclick="copyCard()">Kopyala</button>
</div>

<a href="https://t.me/kenrrry">
<button class="btn">Dəstək</button>
</a>

<div class="info">
Saxta qəbzlər bloklanır
</div>

</div>

<!-- modal -->
<div id="modal" style="display:none;position:fixed;bottom:0;width:100%;background:#111;padding:20px;border-radius:20px 20px 0 0;">
<p>
6₼ birdəfəlik ödəniş edirsiniz.<br>
3 il istifadə edə bilərsiniz.<br><br>
Qəbzi dəstəyə göndərin.
</p>
<button class="btn" onclick="closeModal()">Bağla</button>
</div>

<script>
function openModal(){
document.getElementById("modal").style.display="block";
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

function copyCard(){
navigator.clipboard.writeText("4127 2141 2112 2730");
alert("Kopyalandı");
}

/* timer */
let t=300;
setInterval(()=>{
if(t>0){
t--;
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("time").innerText=
(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}
},1000);
</script>

</body>
</html>
